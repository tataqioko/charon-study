<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Charon-Study 组件 & 动效预览</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Inter","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; background:#f0f0f3; padding:70px 24px 60px; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; gap:8px;
    align-items:center; padding:12px 20px; background:rgba(255,255,255,.9);
    backdrop-filter:blur(20px); border-bottom:1px solid #e5e5e5; }
  .topbar b { font-size:14px; margin-right:6px; }
  .topbar button { padding:7px 15px; border-radius:8px; border:1px solid #ddd; background:#fff;
    cursor:pointer; font-size:13px; font-family:inherit; transition:.2s; }
  .topbar button.active { background:#111; color:#fff; border-color:#111; }

  .lane-wrap { max-width:1120px; margin:0 auto; display:grid; grid-template-columns:1fr; gap:24px; }
  .lane { border-radius:18px; padding:26px 28px; }
  .lane-head { display:flex; align-items:baseline; gap:10px; margin-bottom:20px; }
  .lane-head h2 { font-size:17px; letter-spacing:-.3px; }
  .lane-head span { font-size:12px; opacity:.6; }
  .row { display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:18px; }
  .demo-label { width:100%; font-size:11px; text-transform:uppercase; letter-spacing:.5px;
    opacity:.45; margin-bottom:2px; }

  /* 通用交互动效 */
  .btn { padding:9px 18px; font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;
    border:none; transition:transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, background .2s; }
  .btn:active { transform:scale(.95); }
  .card { padding:18px; cursor:pointer; transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s; }
  .card:hover { transform:translateY(-4px); }
  .switch { width:44px; height:26px; border-radius:20px; position:relative; cursor:pointer; transition:background .25s; }
  .switch .dot { position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition:transform .28s cubic-bezier(.34,1.56,.64,1); box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .switch.on .dot { transform:translateX(18px); }
  .tabs { display:inline-flex; padding:4px; border-radius:11px; position:relative; }
  .tabs .ind { position:absolute; top:4px; bottom:4px; border-radius:8px; transition:all .3s cubic-bezier(.34,1.4,.64,1); z-index:0; }
  .tabs .tab { padding:7px 18px; font-size:13px; cursor:pointer; position:relative; z-index:1; transition:color .2s; border-radius:8px; }
  .input { padding:9px 13px; font-size:14px; font-family:inherit; border-radius:9px; outline:none; transition:.2s; width:220px; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none;
    align-items:center; justify-content:center; opacity:0; transition:opacity .25s; }
  .modal-backdrop.show { display:flex; opacity:1; }
  .modal { width:340px; padding:26px; border-radius:16px; transform:scale(.9) translateY(10px); opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1); }
  .modal-backdrop.show .modal { transform:scale(1) translateY(0); opacity:1; }
  .modal h3 { font-size:17px; margin-bottom:8px; }
  .modal p { font-size:13px; line-height:1.6; opacity:.7; margin-bottom:18px; }

  /* ===== A. shadcn / Linear 极简 ===== */
  .A { background:#fff; color:#0a0a0a; border:1px solid #ececec; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .A .btn { border-radius:8px; }
  .A .btn.primary { background:#18181b; color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.1); }
  .A .btn.primary:hover { background:#27272a; }
  .A .btn.outline { background:#fff; color:#18181b; border:1px solid #e4e4e7; }
  .A .btn.outline:hover { background:#f4f4f5; }
  .A .card { border-radius:12px; border:1px solid #ececec; background:#fff; }
  .A .card:hover { box-shadow:0 8px 24px rgba(0,0,0,.08); }
  .A .switch { background:#e4e4e7; } .A .switch.on { background:#18181b; }
  .A .tabs { background:#f4f4f5; } .A .tabs .ind { background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.08); }
  .A .tab { color:#71717a; } .A .tab.on { color:#18181b; font-weight:500; }
  .A .input { border:1px solid #e4e4e7; } .A .input:focus { border-color:#18181b; box-shadow:0 0 0 3px rgba(0,0,0,.08); }
  .modal.A { background:#fff; color:#0a0a0a; }

  /* ===== B. Naive/清爽企业(圆润友好) ===== */
  .B { background:#fff; color:#333; border:1px solid #efeff5; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .B .btn { border-radius:6px; }
  .B .btn.primary { background:#18a058; color:#fff; }
  .B .btn.primary:hover { background:#36ad6a; box-shadow:0 3px 10px rgba(24,160,88,.3); }
  .B .btn.outline { background:#fff; color:#18a058; border:1px solid #18a058; }
  .B .btn.outline:hover { background:#f0faf4; }
  .B .card { border-radius:10px; border:1px solid #efeff5; background:#fff; }
  .B .card:hover { box-shadow:0 6px 20px rgba(0,0,0,.1); }
  .B .switch { background:#dcdce0; } .B .switch.on { background:#18a058; }
  .B .tabs { background:#f5f5f8; } .B .tabs .ind { background:#18a058; }
  .B .tab { color:#666; } .B .tab.on { color:#fff; }
  .B .input { border:1px solid #e0e0e6; } .B .input:focus { border-color:#18a058; box-shadow:0 0 0 2px rgba(24,160,88,.2); }
  .modal.B { background:#fff; color:#333; }

  /* ===== C. 苹果毛玻璃(景深+弹簧) ===== */
  .C { background:linear-gradient(135deg,#eef1f6,#e3e8f0); color:#1d1d1f; border:1px solid rgba(255,255,255,.7); }
  .C .btn { border-radius:10px; }
  .C .btn.primary { background:linear-gradient(135deg,#007aff,#5856d6); color:#fff; box-shadow:0 3px 10px rgba(0,122,255,.35); }
  .C .btn.primary:hover { box-shadow:0 6px 18px rgba(0,122,255,.5); }
  .C .btn.outline { background:rgba(255,255,255,.7); color:#007aff; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.9); }
  .C .card { border-radius:16px; background:rgba(255,255,255,.6); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.8); box-shadow:0 4px 20px rgba(0,0,0,.06); }
  .C .card:hover { box-shadow:0 14px 40px rgba(0,0,0,.14); }
  .C .switch { background:rgba(0,0,0,.12); } .C .switch.on { background:linear-gradient(135deg,#007aff,#5856d6); }
  .C .tabs { background:rgba(255,255,255,.5); backdrop-filter:blur(10px); }
  .C .tabs .ind { background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.12); }
  .C .tab { color:#86868b; } .C .tab.on { color:#007aff; font-weight:600; }
  .C .input { border:1px solid rgba(0,0,0,.1); background:rgba(255,255,255,.7); }
  .C .input:focus { border-color:#007aff; box-shadow:0 0 0 4px rgba(0,122,255,.15); }
  .modal.C { background:rgba(255,255,255,.9); backdrop-filter:blur(30px); color:#1d1d1f; }
</style>
</head>
<body>
<div class="topbar">
  <b>只看一套 →</b>
  <button onclick="only('A',this)" class="active">A · shadcn 极简</button>
  <button onclick="only('B',this)">B · Naive 清爽</button>
  <button onclick="only('C',this)">C · 苹果毛玻璃</button>
  <button onclick="only('all',this)">全部对比</button>
  <span style="margin-left:auto;font-size:12px;opacity:.6">点按钮/开关/标签页/弹窗感受动效 →</span>
</div>

<div class="lane-wrap" id="wrap"></div>

<div class="modal-backdrop" id="mb" onclick="closeM(event)">
  <div class="modal" id="mo">
    <h3>生成课程</h3>
    <p>确认用当前设置生成「工业药剂学」10 天学习计划?这会调用你的模型。</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn outline" onclick="closeM()">取消</button>
      <button class="btn primary" onclick="closeM()">开始生成</button>
    </div>
  </div>
</div>

<script>
  let curTheme = 'A';
  const laneMeta = {
    A: ['shadcn-vue / Linear 极简', '黑白灰 · 克制留白 · 微妙动效 · 设计师审美'],
    B: ['Naive UI 清爽企业', '圆润友好 · 中文社区好 · 绿色强调 · 实用'],
    C: ['苹果毛玻璃', '景深模糊 · 弹簧动画 · 蓝紫渐变 · 精致'],
  };
  function laneHTML(t) {
    const [title,desc] = laneMeta[t];
    return `<div class="lane ${t}">
      <div class="lane-head"><h2>${title}</h2><span>${desc}</span></div>
      <div class="row"><div class="demo-label">按钮(点击有按压反馈)</div>
        <button class="btn primary">开始学习</button>
        <button class="btn outline">稍后复习</button>
      </div>
      <div class="row"><div class="demo-label">开关 · 标签页(滑动指示器)</div>
        <div class="switch on" onclick="this.classList.toggle('on')"><div class="dot"></div></div>
        <div class="tabs" data-tabs><div class="ind"></div>
          <div class="tab on">讲义</div><div class="tab">测验</div><div class="tab">复习</div>
        </div>
      </div>
      <div class="row"><div class="demo-label">输入框(聚焦光环) · 弹窗(弹簧入场)</div>
        <input class="input" placeholder="输入学习主题…" />
        <button class="btn primary" onclick="openM('${t}')">打开弹窗</button>
      </div>
      <div class="row"><div class="demo-label">卡片(hover 抬升)</div>
        <div class="card" style="width:200px">
          <div style="font-weight:600;margin-bottom:6px">工业药剂学</div>
          <div style="font-size:12px;opacity:.6">Day 3 / 10 · 已完成 60%</div>
        </div>
      </div>
    </div>`;
  }
  function render() {
    const wrap = document.getElementById('wrap');
    const themes = curTheme === 'all' ? ['A','B','C'] : [curTheme];
    wrap.innerHTML = themes.map(laneHTML).join('');
    // 初始化标签页指示器
    document.querySelectorAll('[data-tabs]').forEach(setupTabs);
  }
  function setupTabs(tabs) {
    const ind = tabs.querySelector('.ind');
    const move = (el) => { ind.style.left = el.offsetLeft+'px'; ind.style.width = el.offsetWidth+'px'; };
    const tabsEls = [...tabs.querySelectorAll('.tab')];
    tabsEls.forEach(t => t.onclick = () => {
      tabsEls.forEach(x => x.classList.remove('on')); t.classList.add('on'); move(t);
    });
    requestAnimationFrame(() => move(tabs.querySelector('.tab.on')));
  }
  function only(t, btn) {
    curTheme = t;
    document.querySelectorAll('.topbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  function openM(t) {
    const mb = document.getElementById('mb'), mo = document.getElementById('mo');
    // 主题类挂在 modal 自身,并给按钮包一层主题容器,避免污染遮罩背景
    mo.className = 'modal ' + t;
    mo.querySelectorAll('.btn').forEach(b => b.classList.add(t));
    mb.className = 'modal-backdrop show';
  }
  function closeM(e) {
    if (e && e.target !== document.getElementById('mb')) return;
    document.getElementById('mb').className = 'modal-backdrop';
  }
  render();
</script>
</body>
</html>
